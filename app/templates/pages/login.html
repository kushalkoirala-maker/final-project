<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | NetOps Automation Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <main class="min-vh-100 d-flex align-items-center justify-content-center px-3 py-5">
    <div class="w-100" style="max-width: 440px;">
      <section class="panel-card">
        <div class="brand-mark justify-content-center mb-4">
          <div class="brand-icon"><i class="bi bi-diagram-3-fill"></i></div>
          <div>
            <p class="brand-kicker mb-1">Enterprise NetOps</p>
            <h1 class="brand-title mb-0 text-dark">Automation Platform</h1>
          </div>
        </div>

        <div class="text-center mb-4">
          <h2 class="h3 mb-2">Sign In</h2>
          <p class="text-secondary mb-0">Access device monitoring, template deployment, and job controls.</p>
        </div>

        {% include "partials/flash.html" %}

        <form method="post">
          <div class="form-floating mb-3">
            <input id="username" name="username" type="text" class="form-control" placeholder="Username" required autofocus>
            <label for="username">Username</label>
          </div>

          <div class="form-floating mb-3">
            <input id="password" name="password" type="password" class="form-control" placeholder="Password" required>
            <label for="password">Password</label>
          </div>

          <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>

        <p class="text-secondary small mt-3 mb-0 text-center">Default demo credentials: admin / admin123</p>
      </section>
    </div>
  </main>
</body>
</html>
